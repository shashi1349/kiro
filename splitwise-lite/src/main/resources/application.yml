spring:
  application:
    name: splitwise-lite
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  # PORT is injected by most PaaS platforms (Render, Railway, Heroku-style).
  # Falls back to 8080 for local development.
  port: ${PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

app:
  security:
    jwt:
      # Override in production via JWT_SECRET. Must be at least 32 bytes for HS256.
      secret: ${JWT_SECRET:dev-only-secret-please-replace-in-production-32b!}
      ttl-minutes: 120
      issuer: splitwise-lite

---
# Local development with embedded H2 in PostgreSQL compatibility mode.
# Lets you run the app with zero infrastructure setup.
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:splitwise;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

---
# Real PostgreSQL profile for staging/production-like runs.
# In hosted environments (e.g. Render), the connection details are typically
# injected as individual env vars (DB_HOST, DB_PORT, DB_NAME, DB_USERNAME,
# DB_PASSWORD). Locally you can override DB_URL directly if you prefer.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:splitwise}?sslmode=${DB_SSLMODE:require}}
    username: ${DB_USERNAME:splitwise}
    password: ${DB_PASSWORD:splitwise}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.shashikiranreddy.splitwise: INFO
    org.hibernate.SQL: WARN
